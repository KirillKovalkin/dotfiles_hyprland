# ====== Цветовая палитра (Адаптация из Rofi Dracula) ======
# background-color: #282a36
background = 0xFF282A36

# Элементы интерфейса используют тот же базовый цвет
base = 0xFF282A36
alternate_base = 0xFF282A36

# foreground: #f8f8f2
text = 0xFFF8F8F2
bright_text = 0xFFFFFFFF

# active-background / selected-background: #6272a4
accent = 0xFF6272A4

# urgent-background: #ff5555 (Используется для второстепенного акцента)
accent_secondary = 0xFFFF5555

# ====== Настройки шрифтов ======
font_family = JetBrainsMono Nerd Font
font_family_monospace = JetBrainsMono Nerd Font

# font: "Jetbrains Mono 12" (Размер 12px для основного текста)
h1_size = 16
h2_size = 14
h3_size = 13
font_size = 12
small_font_size = 10

# ====== Скругления (border-radius: 6) ======
rounding_large = 6
rounding_small = 3

# Тема иконок (Автоопределение, так как в Rofi было show-icons: true)
icon_theme = 

